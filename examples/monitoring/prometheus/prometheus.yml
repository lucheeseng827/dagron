# Scrapes the dagron engine's built-in Prometheus endpoint.
#
# The engine exposes `GET /metrics` (text/plain; version=0.0.4) on its management
# API when built with the `ops` feature and `API_ADDR` is set. In the root
# compose stack the engine listens on `engine:8787` inside the `dagron-ui_default`
# network — the target below. If you run the engine elsewhere, change `targets`
# (or set it to `host.docker.internal:8787` when the engine runs on the host).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dagron-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["engine:8787"]
        labels:
          service: dagron-engine
