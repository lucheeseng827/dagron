{{- /*
Chart-managed Secret for the environment-secrets encryption key
(DAGRON_ENV_SECRET_KEY) — read by BOTH dagron-api (encrypts on write) and the
engine (decrypts at dispatch). Only rendered when an inline key is given and
no external Secret is referenced; prefer envSecrets.existingSecret for prod so
the key stays out of values files and helm history.
*/ -}}
{{- if and .Values.envSecrets.key (not .Values.envSecrets.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dagron.fullname" . }}-env-key
  labels:
    {{- include "dagron.labels" . | nindent 4 }}
    app.kubernetes.io/component: env-secrets
type: Opaque
stringData:
  {{ include "dagron.envSecretKeyName" . }}: {{ .Values.envSecrets.key | quote }}
{{- end }}
