{{- if eq (include "dagron.manageUiSecret" .) "true" }}
{{- /* Fail early if the JWT key is too weak — dagron-api rejects < 32 chars. */ -}}
{{- if lt (len .Values.dagronApi.jwtSecret) 32 }}
{{- fail "dagronApi.jwtSecret must be at least 32 characters (or set dagronApi.existingSecret.name)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dagron.fullname" . }}-ui
  labels:
    {{- include "dagron.labels" . | nindent 4 }}
    app.kubernetes.io/component: dagron-api
type: Opaque
stringData:
  {{ .Values.dagronApi.jwtSecretKey | default "DAGRON_JWT_SECRET" }}: {{ .Values.dagronApi.jwtSecret | quote }}
  {{ .Values.dagronApi.adminPasswordKey | default "DAGRON_ADMIN_PASSWORD" }}: {{ .Values.dagronApi.admin.password | quote }}
{{- end }}
