{{- if eq (include "dagron.manageDbSecret" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dagron.fullname" . }}-db
  labels:
    {{- include "dagron.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "dagron.databaseUrl" . | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  {{- end }}
{{- end }}
