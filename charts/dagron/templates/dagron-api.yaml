{{- if .Values.dagronApi.enabled }}
# dagron-api — the authenticated UI gateway over the same Postgres the engine
# writes. Stateless; scales to N replicas. Reads DATABASE_URL from the DB Secret
# and DAGRON_JWT_SECRET / admin password from the UI Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dagron.fullname" . }}-api
  labels:
    {{- include "dagron.labels" . | nindent 4 }}
    app.kubernetes.io/component: dagron-api
spec:
  replicas: {{ .Values.dagronApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: dagron-api
  template:
    metadata:
      labels:
        {{- include "dagron.labels" . | nindent 8 }}
        app.kubernetes.io/component: dagron-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dagron-api
          image: {{ include "dagron.image" (dict "image" $.Values.dagronApi.image "root" $) | quote }}
          imagePullPolicy: {{ .Values.dagronApi.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "dagron.dbSecretName" . }}
                  key: {{ include "dagron.dbSecretKey" . }}
            - name: DAGRON_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "dagron.uiSecretName" . }}
                  key: {{ .Values.dagronApi.jwtSecretKey | default "DAGRON_JWT_SECRET" }}
            - name: PORT
              value: {{ .Values.dagronApi.port | quote }}
            # Cookie is Secure (HTTPS-only) by default; set false only for
            # plain-HTTP ingress (e.g. a kind/k3d smoke test without TLS).
            - name: DAGRON_COOKIE_SECURE
              value: {{ .Values.dagronApi.cookieSecure | quote }}
            - name: RUST_LOG
              value: {{ .Values.dagronApi.rustLog | quote }}
            {{- if eq (include "dagron.envSecretsEnabled" .) "true" }}
            # Encrypts environment secret values on write (the engine holds the
            # same key to decrypt them at dispatch).
            - name: {{ include "dagron.envSecretKeyName" . }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "dagron.envSecretName" . }}
                  key: {{ include "dagron.envSecretKeyName" . }}
            {{- end }}
            {{- if .Values.dagronApi.admin.email }}
            # First admin, seeded idempotently on startup.
            - name: DAGRON_ADMIN_EMAIL
              value: {{ .Values.dagronApi.admin.email | quote }}
            - name: DAGRON_ADMIN_NAME
              value: {{ .Values.dagronApi.admin.name | quote }}
            - name: DAGRON_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dagron.uiSecretName" . }}
                  key: {{ .Values.dagronApi.adminPasswordKey | default "DAGRON_ADMIN_PASSWORD" }}
            {{- end }}
            {{- with .Values.dagronApi.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.dagronApi.port }}
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.dagronApi.port }} }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.dagronApi.port }} }
            periodSeconds: 15
          resources:
            {{- toYaml .Values.dagronApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dagron.fullname" . }}-api
  labels:
    {{- include "dagron.labels" . | nindent 4 }}
    app.kubernetes.io/component: dagron-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: dagron-api
  ports:
    - port: {{ .Values.dagronApi.port }}
      targetPort: {{ .Values.dagronApi.port }}
      name: http
{{- end }}
